services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Pick up bind-mounted code changes without rebuilding the image
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/models:/app/models
      - ./backend/data:/app/data
      - ./backend/ontology_data:/app/ontology_data
    environment:
      - PYTHONPATH=/app
      - KF_DATA_DIR=/app/data
      - KF_MODELS_DIR=/app/models
      - KF_UPLOAD_DIR=/app/uploads
      - KF_CHROMA_DIR=/app/chroma_db
      - KF_ONTOLOGY_DATA_DIR=/app/ontology_data
      - KF_ONTOLOGY_UPLOAD_DIR=/app/ontology_data/uploads
      - DATABASE_URL=postgresql://knowledge_user:knowledge_pass@postgres:5432/knowledge_fabric
      - USE_GRAPH_RETRIEVAL=true
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - UPLOAD_DIR=/app/uploads
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - BEDROCK_ENABLED=${BEDROCK_ENABLED:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-us.anthropic.claude-sonnet-4-5-20250929-v1:0}
      - BEDROCK_ONTOLOGY_MODEL_ID=${BEDROCK_ONTOLOGY_MODEL_ID:-}
      - ONTOLOGY_LLM_PROVIDER=${ONTOLOGY_LLM_PROVIDER:-}
      - ENABLED_LLM_PROVIDERS=${ENABLED_LLM_PROVIDERS:-openai,bedrock}
    networks:
      - knowledge_fabric
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    networks:
      - knowledge_fabric
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a PostgreSQL database for additional features
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: knowledge_fabric
      POSTGRES_USER: knowledge_user
      POSTGRES_PASSWORD: knowledge_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - knowledge_fabric

  # Optional: Add Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - knowledge_fabric
    profiles:
      - cache

volumes:
  # Backend state (uploads / chroma / models / data / ontology_data) now lives
  # in the repo at ./backend/* via bind mounts on the backend service above,
  # so it's shared with the native uvicorn workflow. Only Postgres/Redis —
  # which are opt-in via profiles — still use named volumes.
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  knowledge_fabric:
    driver: bridge 